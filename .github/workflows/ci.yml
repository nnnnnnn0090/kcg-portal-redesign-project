name: extension-ci
on:
  push:
    branches: [main, rewrite]
  pull_request:
concurrency:
  group: ext-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx depcruise src --config .dependency-cruiser.cjs
      - run: npx type-coverage --at-least 99.5 --strict
      - run: node scripts/contract-freeze.mjs --check
      - run: npx vitest run --coverage
      - run: npm run build
      - run: npm run build:firefox
      - run: node scripts/manifest-equivalence.mjs --golden ../golden/manifest.chrome.json --target .output/chrome-mv3/manifest.json --version-source version.json
      - run: node scripts/manifest-equivalence.mjs --golden ../golden/manifest.firefox.json --target .output/firefox-mv3/manifest.json --version-source version.json
      - run: node scripts/css-equivalence.mjs --check --golden ../golden/css --target .output
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            app/.output
            app/artifacts
          retention-days: 7
  reproducibility:
    runs-on: ubuntu-24.04
    needs: verify
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build && mv .output ../out1
      - run: npm run build && mv .output ../out2
      - run: |
          h1=$(cd ../out1 && find . -type f ! -name '*.map' -print0 | sort -z | xargs -0 sha256sum | sha256sum)
          h2=$(cd ../out2 && find . -type f ! -name '*.map' -print0 | sort -z | xargs -0 sha256sum | sha256sum)
          test "$h1" = "$h2"
  e2e:
    runs-on: ubuntu-24.04
    needs: verify
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npx playwright test --project=e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-report
          path: app/playwright-report
          retention-days: 7
  flows:
    runs-on: ubuntu-24.04
    needs: verify
    defaults:
      run:
        working-directory: app
    env:
      PORTAL_MS_EMAIL: ${{ secrets.PORTAL_MS_EMAIL }}
      PORTAL_MS_PASSWORD: ${{ secrets.PORTAL_MS_PASSWORD }}
      COMMUNITY_E2E_LOGIN_ID: ${{ secrets.COMMUNITY_E2E_LOGIN_ID }}
      COMMUNITY_E2E_PASSWORD: ${{ secrets.COMMUNITY_E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npx playwright test --project=flows
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: flows-report
          path: app/playwright-report
          retention-days: 7
